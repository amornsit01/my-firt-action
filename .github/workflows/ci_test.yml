name: CI - Run Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

#      - name: Deploy to server
#        run: ./deploy.sh
        env:
         MY_NAME: ${{ secrets.YOUR_NAME }}

      - name: Say Hello
        run: echo "Hello, Github Actions! to  ${{ secrets.YOUR_NAME }}"